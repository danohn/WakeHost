name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project WakeHost.xcodeproj \
            -scheme WakeHost \
            -configuration Release \
            -archivePath build/WakeHost.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app from Archive
        run: |
          cp -R build/WakeHost.xcarchive/Products/Applications/WakeHost.app build/WakeHost.app

      - name: Import Developer ID Certificate
        env:
          P12_DATA: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain

          # Import the certificate
          echo "$P12_DATA" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign App
        run: |
          codesign \
            --deep \
            --force \
            --options runtime \
            --sign "Developer ID Application" \
            --timestamp \
            build/WakeHost.app

      - name: Notarize App
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          # Write the .p8 key file
          printf '%s' "$ASC_KEY" > /tmp/asc_key.p8

          # Create a zip for notarization (notarytool requires zip or dmg, not .app directly)
          ditto -c -k --keepParent build/WakeHost.app /tmp/WakeHost.zip

          # Submit for notarization and wait for result
          xcrun notarytool submit /tmp/WakeHost.zip \
            --key /tmp/asc_key.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER" \
            --wait

      - name: Staple Notarization
        run: |
          xcrun stapler staple build/WakeHost.app

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "WakeHost" \
            -srcfolder build/WakeHost.app \
            -ov -format UDZO \
            build/WakeHost.dmg

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} build/WakeHost.dmg