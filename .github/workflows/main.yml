name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project WakeHost.xcodeproj \
            -scheme WakeHost \
            -configuration Release \
            -archivePath build/WakeHost.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app from Archive
        run: |
          cp -R build/WakeHost.xcarchive/Products/Applications/WakeHost.app build/WakeHost.app

      - name: Write credentials to files
        env:
          P12_DATA: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "$P12_DATA" | base64 --decode > /tmp/certificate.p12
          printf '%s' "$ASC_KEY" > /tmp/app_store_connect.p8

      - name: Sign and Notarize
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: build/WakeHost.app
          output_path: build/WakeHost-signed.app
          p12_file: /tmp/certificate.p12
          p12_password: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          notarize: true
          staple: true
          app_store_connect_api_issuer: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          app_store_connect_api_key: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          app_store_connect_api_key_json_file: /tmp/app_store_connect.p8

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "WakeHost" \
            -srcfolder build/WakeHost-signed.app \
            -ov -format UDZO \
            build/WakeHost.dmg

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} build/WakeHost.dmg