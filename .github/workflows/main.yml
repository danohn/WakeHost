name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project WakeHost.xcodeproj \
            -scheme WakeHost \
            -configuration Release \
            -archivePath build/WakeHost.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app from Archive
        run: |
          mkdir -p build
          cp -R build/WakeHost.xcarchive/Products/Applications/WakeHost.app build/WakeHost.app

      - name: Import Developer ID Certificate
        env:
          P12_DATA: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain

          echo "$P12_DATA" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign App
        run: |
          codesign \
            --deep \
            --force \
            --options runtime \
            --sign "Developer ID Application" \
            --timestamp \
            build/WakeHost.app

      - name: Notarize App
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          printf '%s' "$ASC_KEY" > /tmp/asc_key.p8

          ditto -c -k --keepParent build/WakeHost.app /tmp/WakeHost.zip

          xcrun notarytool submit /tmp/WakeHost.zip \
            --key /tmp/asc_key.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER" \
            --wait

      - name: Staple Notarization
        run: |
          xcrun stapler staple build/WakeHost.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create styled DMG
        run: |
          mkdir -p dmg
          cp -R build/WakeHost.app dmg/
          ln -s /Applications dmg/Applications

          create-dmg \
            --volname "WakeHost" \
            --window-size 600 350 \
            --icon-size 96 \
            --icon "WakeHost.app" 160 180 \
            --icon "Applications" 440 180 \
            --hide-extension "WakeHost.app" \
            --app-drop-link 440 180 \
            --no-internet-enable \
            build/WakeHost.dmg \
            dmg/

      - name: Create GitHub Release and Upload DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "WakeHost ${{ github.ref_name }}" \
            --generate-notes \
            build/WakeHost.dmg